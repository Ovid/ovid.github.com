<div class="collapsible-section">
    <div class="collapsible-trigger"
         id="collapsible-trigger-1"
         role="button"
         tabindex="0"
         aria-expanded="false"
         aria-controls="collapsible-content-1"
         aria-label="Expand: Click to see details">
        <i class="fa fa-chevron-right collapsible-icon" aria-hidden="true"></i>
        <span class="collapsible-short">Click to see details</span>
    </div>
    <div id="collapsible-content-1"
         class="collapsible-content"
         role="region"
         aria-labelledby="collapsible-trigger-1">
        <p>This is the full content that appears when expanded.</p>

    </div>
</div>
